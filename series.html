<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REKOMEDIA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <script src="data.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
<header class="top-bar">
    <h1 class="epic-title">🎬 REKOMEDIA</h1>
    <p class="section-title">Temukan Rekomendasi Movie dan Series Berbasis Media Digital</p>
    <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="movie.html" class="nav-link">Movie</a>
        <a href="series.html" class="nav-link active">Series</a>
    </nav>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari..." onkeyup="searchMedia()">
        <div class="filter-wrapper">
            <button class="filter-btn" onclick="toggleFilterMenu()">☰</button>
            <div id="filterMenu" class="filter-menu">
                <div onclick="setFilter('actor')">Actor</div>
                <div onclick="setFilter('country')">Negara</div>
                <div onclick="setFilter('year')">Tahun</div>
            </div>
        </div>
    </div>
</header>
<main>
    <h2 class="section-heading">Action</h2>
    <div id="actionSeries" class="container"></div>
    <h2 class="section-heading">Romance</h2>
    <div id="romanceSeries" class="container"></div>
    <h2 class="section-heading">Animation</h2>
    <div id="animationSeries" class="container"></div>
    <h2 class="section-heading">Horror</h2>
    <div id="horrorSeries" class="container"></div>
    <h2 class="section-heading">Comedy</h2>
    <div id="comedySeries" class="container"></div>
    <h2 class="section-heading">Thriller</h2>
    <div id="thrillerSeries" class="container"></div>
</main>
<div id="modal" class="modal" onclick="closeDetail()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="mPoster" alt="">
        <h2 id="mTitle"></h2>
        <div class="detail-info">
            <span id="mRating"></span>
            <span id="mYear"></span>
            <span id="mGenre"></span>
            <span id="mCountry"></span>
        </div>
        <p id="mDesc"></p>
        <p id="mActor"></p>
        <iframe id="mVideo" frameborder="0" allowfullscreen></iframe>
        <button onclick="playTrailer()" class="trailer-btn">▶ Play Trailer</button>
    </div>
</div>
</body>
</html>
